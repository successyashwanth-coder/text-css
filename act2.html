<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transform</title>
    <style>
        #mirror{
            transform: scaleX(-1);
        }
        div {
            width:600px;
            height:200px;
            background: olive;
            border:2px solid;
        }
        #mirror{
            transform:rotate(180deg);
        }
    </style>
</head>
<body>
   <h1>transform</h1> 
   <div>we are living my exams days </div>
   <div id="mirror"> we are living our exams days </div>
</body>
</html>
