<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shadow</title>
    <style>
        #text{
            text-shadow: 5px 5px 5px red;
        }
       #box{
            box-shadow: 2px 2px 5px purple;
        }
        #indent{
            text-indent: 50px;
        }
    </style>
</head>
<body>
  <h1 id="text">Hello, World!</h1>
  <div id="box">This is a box with a shadow.</div>
  <p id="indent">This paragraph has an indent.</p>
  <div>
    <p>tis is the example of text- indent</p>
    <p id ="ident">this is example text-indent</p>
  </div>
</body>
</html>
